apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ai
  labels:
    app: {{ .Release.Name }}-ai
    {{- include "h2bis-pb.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.ai.replicas }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-ai
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-ai
    spec:
      containers:
        - name: ai
          image: "{{ .Values.ai.image.repository }}:{{ .Values.ai.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.ai.port }}
          env:
            - name: NODE_ENV
              value: {{ .Values.global.nodeEnv | quote }}
            - name: PORT
              value: {{ .Values.ai.port | quote }}
            - name: API_BASE_URL
              value: {{ .Values.ai.env.API_BASE_URL | quote }}
            - name: OPENAI_MODEL
              value: {{ .Values.ai.env.OPENAI_MODEL | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.ai.env.LOG_LEVEL | quote }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: openai-api-key
          resources:
            {{- toYaml .Values.ai.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.ai.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.ai.port }}
            initialDelaySeconds: 20
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-ai
  labels:
    {{- include "h2bis-pb.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.ai.port }}
      targetPort: {{ .Values.ai.port }}
  selector:
    app: {{ .Release.Name }}-ai
