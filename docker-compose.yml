# ============================================================
# docker-compose.yml
# Root of the h2bis-pb monorepo
#
# Usage:
#   docker compose up --build        # build images and start all services
#   docker compose up -d --build     # same but detached (runs in background)
#   docker compose down              # stop and remove containers
#   docker compose down -v           # also delete the mongo-data volume
#   docker compose logs -f h2bis-pb-api  # stream logs for one service
#
# Service communication:
#   Containers talk to each other using SERVICE NAMES as hostnames,
#   not "localhost". e.g. Web reaches the API at h2bis-pb-api:4000.
#   To reach a service on the Windows HOST (e.g. MongoDB), use the
#   special hostname host.docker.internal instead of localhost.
# ============================================================

services:

  # ── REST API ───────────────────────────────────────────────────────────────
  # Build context is the WORKSPACE ROOT (not ./h2bis-pb-api) because the API
  # depends on h2bis-pb-ai via a file: path — the Dockerfile needs both directories.
  h2bis-pb-api:
    build:
      context: .                            # ← workspace root, not ./h2bis-pb-api
      dockerfile: h2bis-pb-api/Dockerfile
    container_name: h2bis-pb-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - ./h2bis-pb-api/.env
    environment:
      NODE_ENV: production
      PORT: 4000
      MONGODB_URI: mongodb+srv://h2bis_app_user_dev:hWOeNENJ9l5YVtkN@h2bis-dev.ge3apn5.mongodb.net/
      DB_NAME: h2bis-project-brain
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/api/auth/github/authorize').catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    networks:
      - h2bis-pb-network

  # ── Next.js Frontend ───────────────────────────────────────────────────────
  h2bis-pb-web:
    build:
      context: ./h2bis-pb-web
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_ vars are baked into the JS bundle at build time.
        # The browser loads the page from localhost:3000 and makes API
        # calls to localhost:4000 (the host-exposed port), NOT the
        # internal service name — the browser is not inside Docker.
        NEXT_PUBLIC_API_URL: http://localhost:4000
    container_name: h2bis-pb-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./h2bis-pb-web/.env.local
    environment:
      NODE_ENV: production
      PORT: 3000
      # Server-side Next.js calls use the internal Docker service name
      API_URL: http://h2bis-pb-api:4000
      NEXTAUTH_URL: http://localhost:3000
    depends_on:
      - h2bis-pb-api
    networks:
      - h2bis-pb-network

  # ── MCP Server ─────────────────────────────────────────────────────────────
  # MCP runs locally as a child process spawned by VS Code (via .vscode/mcp.json
  # or the user's mcp.json with npx h2bis-mcp@latest). It is NOT containerised.
  # Reason: the stdio MCP transport requires a browser for GitHub OAuth, which
  # containers do not have. Run `docker compose up --build` to start API + web only.
  # h2bis-pb-mcp: (intentionally omitted)

# ── Networks ───────────────────────────────────────────────────────────────
networks:
  h2bis-pb-network:
    driver: bridge
    # All services on this network can reach each other by service name.
    # From outside (your browser, Compass, Postman), access via localhost:<port>.

